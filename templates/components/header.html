<!-- Индикатор загрузки -->
<div x-cloak class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-blue via-blue-600 to-brand-blue animate-pulse z-50"></div>

<header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-brand-dark/80 border-b border-gray-200 dark:border-gray-700 transition-colors shadow-sm">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 h-14 sm:h-16 flex items-center justify-between gap-2">

        <!-- Логотип -->
        <a href="https://avencores.github.io/goida-vpn-site/"
           @click="if(window.trackEvent) window.trackEvent('header_brand_click', { target: 'goida_vpn_site' })"
           data-no-confirm
           class="flex items-center gap-2 sm:gap-3 group cursor-pointer min-w-0">
            <div class="relative">
                <div class="absolute inset-0 bg-brand-blue/20 blur-lg rounded-full scale-0 group-hover:scale-150 transition-transform duration-500"></div>
                <img src="static/images/favicon.png" alt="Логотип Goida VPN - Автоматические конфиги" class="w-8 h-8 sm:w-9 sm:h-9 object-contain relative z-10 group-hover:rotate-12 transition-transform duration-300">
            </div>
            <h1 class="hidden min-[480px]:block max-w-[10rem] truncate font-black text-base leading-none tracking-tighter sm:max-w-none sm:text-xl">
                Goida VPN <span class="bg-gradient-to-r from-blue-600 to-brand-blue bg-clip-text text-transparent">Configs</span>
            </h1>
        </a>

        <!-- Правая часть -->
        <div class="flex items-center gap-1.5 sm:gap-3 min-w-0">

            <!-- Соцсети -->
            <div class="flex items-center gap-1.5 sm:gap-3 border-r border-gray-200 dark:border-gray-600 pr-2 sm:pr-4 mr-0.5 sm:mr-1">
                <a href="https://www.youtube.com/@avencores/" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'youtube', location: 'header' })"
                   class="text-red-600 hover:scale-125 transition-all duration-300 p-1 -m-1 touch-manipulation">
                    <i class="fa-brands fa-youtube text-xl sm:text-2xl"></i>
                </a>
                <a href="https://t.me/avencoresyt" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'telegram', location: 'header' })"
                   class="text-blue-500 hover:scale-125 transition-all duration-300 p-1 -m-1 touch-manipulation">
                    <i class="fa-brands fa-telegram text-xl sm:text-2xl"></i>
                </a>
                <a href="https://vk.ru/avencoresreuploads" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'vk', location: 'header' })"
                   class="text-blue-700 hover:scale-125 transition-all duration-300 p-1 -m-1 touch-manipulation">
                    <i class="fa-brands fa-vk text-xl sm:text-2xl"></i>
                </a>
                <a href="https://dzen.ru/avencores" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'dzen', location: 'header' })"
                   class="hover:scale-125 transition-all duration-300 w-5 h-5 sm:w-6 sm:h-6 flex items-center justify-center touch-manipulation">
                    <img :src="darkMode ? 'static/media/dzen-white.png' : 'static/media/dzen-black.png'" alt="Dzen" class="w-full h-full object-contain">
                </a>
            </div>

            <!-- Кнопки управления -->
            <div class="flex items-center gap-1 sm:gap-2">

                <!-- Переключатель языка -->
                <div class="relative" @click.outside="langOpen = false">
                    <button @click="langOpen = !langOpen"
                        class="group w-auto h-9 sm:h-10 flex items-center gap-1.5 px-2.5 sm:px-3 rounded-xl bg-gray-100/50 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:bg-white dark:hover:bg-white/10 hover:border-blue-300 dark:hover:border-blue-500/30 transition-all duration-200 touch-manipulation shrink-0"
                        :class="langOpen ? 'bg-white dark:bg-white/10 border-blue-300 dark:border-blue-500/30 shadow-sm' : ''">
                        <i class="fa-solid fa-globe text-sm text-brand-blue dark:text-blue-400 group-hover:rotate-12 transition-transform duration-300"></i>
                        <span class="font-black text-[10px] sm:text-xs text-brand-blue dark:text-blue-400 uppercase tracking-wider"
                              x-text="(currentLanguage || 'ru').toUpperCase()"></span>
                        <i class="fa-solid fa-chevron-down text-[8px] sm:text-xs text-gray-400 dark:text-gray-500 transition-transform duration-200"
                           :class="langOpen ? 'rotate-180' : ''"></i>
                    </button>

                    <!-- Dropdown -->
                    <div x-show="langOpen"
                         x-transition:enter="transition ease-out duration-200"
                         x-transition:enter-start="opacity-0 -translate-y-2 scale-95"
                         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                         x-transition:leave="transition ease-in duration-150"
                         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                         x-transition:leave-end="opacity-0 -translate-y-2 scale-95"
                         class="absolute right-0 top-full mt-2 w-48 bg-white dark:bg-brand-panel border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl z-50 overflow-hidden"
                         style="display: none;">
                        <button @click="window.i18n && window.i18n.setLanguage ? window.i18n.setLanguage('ru') : (currentLanguage = 'ru'); langOpen = false"
                                class="w-full px-4 py-2.5 text-left text-sm font-bold flex items-center gap-3 justify-between transition-colors hover:bg-gray-50 dark:hover:bg-white/5"
                                :class="currentLanguage === 'ru' ? 'text-brand-blue dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                            <span class="flex items-center gap-2.5">
                                <img src="https://flagcdn.com/w20/ru.png" srcset="https://flagcdn.com/w20/ru.png 1x, https://flagcdn.com/w40/ru.png 2x" alt="RU" class="w-5 h-3.5 rounded-sm shadow-sm object-cover" loading="lazy">
                                <span>Русский</span>
                            </span>
                            <svg x-show="currentLanguage === 'ru'" class="w-4 h-4 text-brand-blue dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button @click="window.i18n && window.i18n.setLanguage ? window.i18n.setLanguage('en') : (currentLanguage = 'en'); langOpen = false"
                                class="w-full px-4 py-2.5 text-left text-sm font-bold flex items-center gap-3 justify-between transition-colors hover:bg-gray-50 dark:hover:bg-white/5 border-t border-gray-100 dark:border-gray-700"
                                :class="currentLanguage === 'en' ? 'text-brand-blue dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                            <span class="flex items-center gap-2.5">
                                <img src="https://flagcdn.com/w20/gb.png" srcset="https://flagcdn.com/w20/gb.png 1x, https://flagcdn.com/w40/gb.png 2x" alt="GB" class="w-5 h-3.5 rounded-sm shadow-sm object-cover" loading="lazy">
                                <span>English</span>
                            </span>
                            <svg x-show="currentLanguage === 'en'" class="w-4 h-4 text-brand-blue dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button @click="window.i18n && window.i18n.setLanguage ? window.i18n.setLanguage('de') : (currentLanguage = 'de'); langOpen = false"
                                class="w-full px-4 py-2.5 text-left text-sm font-bold flex items-center gap-3 justify-between transition-colors hover:bg-gray-50 dark:hover:bg-white/5 border-t border-gray-100 dark:border-gray-700"
                                :class="currentLanguage === 'de' ? 'text-brand-blue dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                            <span class="flex items-center gap-2.5">
                                <img src="https://flagcdn.com/w20/de.png" srcset="https://flagcdn.com/w20/de.png 1x, https://flagcdn.com/w40/de.png 2x" alt="DE" class="w-5 h-3.5 rounded-sm shadow-sm object-cover" loading="lazy">
                                <span>Deutsch</span>
                            </span>
                            <svg x-show="currentLanguage === 'de'" class="w-4 h-4 text-brand-blue dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button @click="window.i18n && window.i18n.setLanguage ? window.i18n.setLanguage('uk') : (currentLanguage = 'uk'); langOpen = false"
                                class="w-full px-4 py-2.5 text-left text-sm font-bold flex items-center gap-3 justify-between transition-colors hover:bg-gray-50 dark:hover:bg-white/5 border-t border-gray-100 dark:border-gray-700"
                                :class="currentLanguage === 'uk' ? 'text-brand-blue dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20' : 'text-gray-700 dark:text-gray-300'">
                            <span class="flex items-center gap-2.5">
                                <img src="https://flagcdn.com/w20/ua.png" srcset="https://flagcdn.com/w20/ua.png 1x, https://flagcdn.com/w40/ua.png 2x" alt="UA" class="w-5 h-3.5 rounded-sm shadow-sm object-cover" loading="lazy">
                                <span>Українська</span>
                            </span>
                            <svg x-show="currentLanguage === 'uk'" class="w-4 h-4 text-brand-blue dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Тема -->
                <button @click="toggleTheme()"
                    class="group w-9 h-9 sm:w-auto sm:h-10 sm:px-3 flex items-center justify-center sm:justify-start gap-0 sm:gap-2 rounded-xl bg-gray-100/50 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:bg-white dark:hover:bg-white/10 hover:border-gray-300 dark:hover:border-white/20 transition-all duration-200 active:scale-95 touch-manipulation shrink-0">
                    <i class="fa-solid text-base sm:text-lg transition-all duration-300 group-hover:rotate-12" :class="darkMode ? 'fa-sun text-yellow-400' : 'fa-moon text-blue-600'"></i>
                    <span class="hidden sm:inline text-sm font-bold text-gray-700 dark:text-gray-300" x-text="darkMode ? (i18nReady && currentLanguage === 'en' ? 'Light' : i18nReady && currentLanguage === 'de' ? 'Hell' : i18nReady && currentLanguage === 'uk' ? 'Світла' : 'Светлая') : (i18nReady && currentLanguage === 'en' ? 'Dark' : i18nReady && currentLanguage === 'de' ? 'Dunkel' : i18nReady && currentLanguage === 'uk' ? 'Темна' : 'Тёмная')"></span>
                </button>

                <!-- Статистика -->
                <button @click="showStatsModal = true"
                    class="group bg-gradient-to-br from-blue-600 to-brand-blue text-white rounded-xl text-sm font-bold hover:shadow-lg hover:shadow-blue-500/30 transition-all duration-300 active:scale-95 flex items-center justify-center w-9 h-9 sm:w-auto sm:h-10 sm:px-5 border border-white/20 touch-manipulation shrink-0">
                    <i class="fa-solid fa-chart-simple text-base sm:text-lg sm:mr-2 group-hover:rotate-12 transition-transform"></i>
                    <span class="hidden sm:inline" x-text="currentLanguage === 'en' && i18nReady ? 'Statistics' : (currentLanguage === 'de' && i18nReady ? 'Statistiken' : (currentLanguage === 'uk' && i18nReady ? 'Статистика' : 'Статистика'))">Статистика</span>
                </button>

                <!-- GitHub -->
                <a href="https://github.com/AvenCores/goida-vpn-configs" target="_blank"
                    @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'github', location: 'header' })"
                    class="group bg-gradient-to-br from-gray-900 to-gray-800 dark:from-gray-800 dark:to-gray-700 text-white rounded-xl text-sm font-bold hover:shadow-lg hover:shadow-black/30 transition-all duration-300 active:scale-95 flex items-center justify-center w-9 h-9 sm:w-auto sm:h-10 sm:px-5 border border-white/10 touch-manipulation shrink-0">
                    <i class="fa-brands fa-github text-lg sm:text-xl sm:mr-2 group-hover:scale-110 transition-transform"></i>
                    <span class="hidden sm:inline">GitHub</span>
                </a>
            </div>
        </div>

    </div>
</header>
