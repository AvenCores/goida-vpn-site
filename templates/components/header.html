<!-- Индикатор загрузки -->
<div x-cloak class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-blue via-blue-600 to-brand-blue animate-pulse z-50"></div>

<header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-brand-dark/80 border-b border-gray-200 dark:border-gray-700 transition-colors shadow-sm">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 h-14 sm:h-16 flex items-center justify-between gap-2">

        <!-- Логотип -->
        <div class="flex items-center gap-2 sm:gap-3 group cursor-default shrink-0">
            <div class="relative">
                <div class="absolute inset-0 bg-brand-blue/20 blur-lg rounded-full scale-0 group-hover:scale-150 transition-transform duration-500"></div>
                <img src="static/images/favicon.png" alt="Логотип Goida VPN - Автоматические конфиги" class="w-8 h-8 sm:w-9 sm:h-9 object-contain relative z-10 group-hover:rotate-12 transition-transform duration-300">
            </div>
            <h1 class="font-black text-lg sm:text-xl tracking-tighter hidden xs:block">
                Goida VPN <span class="bg-gradient-to-r from-blue-600 to-brand-blue bg-clip-text text-transparent">Configs</span>
            </h1>
        </div>

        <!-- Правая часть -->
        <div class="flex items-center gap-1.5 sm:gap-3 min-w-0">

            <!-- Соцсети — скрыты на самых маленьких экранах, показываем с xs -->
            <div class="hidden xs:flex items-center gap-2 sm:gap-3 border-r border-gray-200 dark:border-gray-600 pr-2 sm:pr-4 mr-0.5 sm:mr-1">
                <a href="https://www.youtube.com/@avencores/" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'youtube', location: 'header' })"
                   class="text-red-600 hover:scale-125 transition-all duration-300 p-1 -m-1 touch-manipulation">
                    <i class="fa-brands fa-youtube text-xl sm:text-2xl"></i>
                </a>
                <a href="https://t.me/avencoresyt" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'telegram', location: 'header' })"
                   class="text-blue-500 hover:scale-125 transition-all duration-300 p-1 -m-1 touch-manipulation">
                    <i class="fa-brands fa-telegram text-xl sm:text-2xl"></i>
                </a>
                <a href="https://vk.ru/avencoresreuploads" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'vk', location: 'header' })"
                   class="text-blue-700 hover:scale-125 transition-all duration-300 p-1 -m-1 touch-manipulation">
                    <i class="fa-brands fa-vk text-xl sm:text-2xl"></i>
                </a>
                <a href="https://dzen.ru/avencores" target="_blank"
                   @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'dzen', location: 'header' })"
                   class="hover:scale-125 transition-all duration-300 w-6 h-6 flex items-center justify-center p-1 -m-1 touch-manipulation">
                    <img :src="darkMode ? 'static/media/dzen-white.png' : 'static/media/dzen-black.png'" alt="Dzen" class="w-full h-full object-contain">
                </a>
            </div>

            <!-- Кнопки управления -->
            <div class="flex items-center gap-1 sm:gap-2">

                <!-- Тема -->
                <button @click="toggleTheme()"
                    class="group w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-xl bg-gray-100/50 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:bg-white dark:hover:bg-white/10 transition-all duration-300 hover:shadow-lg hover:shadow-gray-500/10 active:scale-90 relative overflow-hidden touch-manipulation shrink-0">
                    <div class="relative z-10">
                        <i class="fa-solid text-base sm:text-lg transition-all duration-500" :class="darkMode ? 'fa-sun text-yellow-400 rotate-[360deg] scale-110' : 'fa-moon text-blue-600 rotate-0'"></i>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                </button>

                <!-- Статистика -->
                <button @click="showStatsModal = true"
                    class="group bg-gradient-to-br from-blue-600 to-brand-blue text-white rounded-xl text-sm font-bold hover:shadow-lg hover:shadow-blue-500/30 transition-all duration-300 active:scale-95 flex items-center justify-center w-9 h-9 sm:w-auto sm:h-10 sm:px-5 border border-white/20 touch-manipulation shrink-0">
                    <i class="fa-solid fa-chart-simple text-base sm:text-lg sm:mr-2 group-hover:rotate-12 transition-transform"></i>
                    <span class="hidden sm:inline">Статистика</span>
                </button>

                <!-- GitHub -->
                <a href="https://github.com/AvenCores/goida-vpn-configs" target="_blank"
                    @click="if(window.trackEvent) window.trackEvent('social_click', { platform: 'github', location: 'header' })"
                    class="group bg-gradient-to-br from-gray-900 to-gray-800 dark:from-gray-800 dark:to-gray-700 text-white rounded-xl text-sm font-bold hover:shadow-lg hover:shadow-black/30 transition-all duration-300 active:scale-95 flex items-center justify-center w-9 h-9 sm:w-auto sm:h-10 sm:px-5 border border-white/10 touch-manipulation shrink-0">
                    <i class="fa-brands fa-github text-lg sm:text-xl sm:mr-2 group-hover:scale-110 transition-transform"></i>
                    <span class="hidden sm:inline">GitHub</span>
                </a>
            </div>
        </div>

    </div>
</header>
