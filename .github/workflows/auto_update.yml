name: Auto Update & Deploy Goida VPN Site

on:
  # Запуск при пуше в ветку main (когда вы обновляете код)
  push:
    branches: [ "main" ]
  
  # Запуск по расписанию (каждый час), чтобы обновлять конфиги
  schedule:
    - cron: '0 * * * *'
  
  # Кнопка для ручного запуска из вкладки Actions
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Run Build and Deploy Script
        env:
          # Сюда передаем токен из секретов репозитория
          MY_TOKEN: ${{ secrets.MY_TOKEN }}
          GA_ID: ${{ secrets.GA_ID || vars.GA_ID }}
          YM_ID: ${{ secrets.YM_ID || vars.YM_ID }}
          YANDEX_AUTOPLACEMENT_ID: ${{ secrets.YANDEX_AUTOPLACEMENT_ID || vars.YANDEX_AUTOPLACEMENT_ID }}
        run: python build.py
