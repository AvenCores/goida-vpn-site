name: Auto Update & Deploy Goida VPN Site

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Build Tailwind CSS
        run: |
          npm install
          npm run build:css

      - name: Build and deploy site
        env:
          MY_TOKEN: ${{ secrets.MY_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GA_ID: ${{ secrets.GA_ID || vars.GA_ID }}
          YM_ID: ${{ secrets.YM_ID || vars.YM_ID }}
          YANDEX_AUTOPLACEMENT_ID: ${{ secrets.YANDEX_AUTOPLACEMENT_ID || vars.YANDEX_AUTOPLACEMENT_ID }}
        run: python build.py --deploy
